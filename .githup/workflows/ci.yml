name: DevOps Journey CI Pipeline

on:
  push:
    branches: [ main ] # Sadece main şubesine push yapıldığında çalış

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Bulutta tertemiz bir Ubuntu makinesi aç

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # GitHub'daki kodlarımızı bu makineye indir

      - name: Set up JDK 17
        uses: actions/setup-java@v3 # Makineye Java 17 kur
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build with Maven
        run: ./mvnw clean package # Projemizi bulutta jar haline getir

      - name: Login to Docker Hub
        uses: docker/login-action@v2 # Docker Hub'a bizim şifrelerimizle giriş yap
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4 # İmajı bas ve Docker Hub'a uçur!
        with:
          context: .
          push: true
          tags: mehmethalman/devops_journey:latest # Buraya kendi kullanıcı adımızı yazdık!